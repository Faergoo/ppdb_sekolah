<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - SMKN 4 Palembang</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    background: #0c1c2e;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 70% 55% at 15% 85%, rgba(14,90,160,0.4) 0%, transparent 60%),
      radial-gradient(ellipse 55% 45% at 85% 15%, rgba(180,60,20,0.2) 0%, transparent 55%),
      #0c1c2e;
  }

  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 44px 44px;
  }

  .card {
    position: relative; z-index: 1;
    width: min(420px, 94vw);
    background: #f7f5f0;
    border-radius: 20px;
    padding: 48px 44px 44px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-area {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-icon {
    width: 64px; height: 64px;
    background: #0e5aa0;
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    font-size: 28px;
  }

  .logo-area h1 {
    font-size: 20px;
    font-weight: 700;
    color: #0c1c2e;
    letter-spacing: -0.3px;
  }

  .logo-area p {
    font-size: 12.5px;
    color: #9ca3af;
    margin-top: 4px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 7px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap svg {
    position: absolute;
    left: 13px; top: 50%;
    transform: translateY(-50%);
    width: 17px; height: 17px;
    stroke: #9ca3af;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
  }

  .input-wrap input {
    width: 100%;
    height: 46px;
    padding: 0 14px 0 40px;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: white;
    color: #111827;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrap input:focus {
    border-color: #0e5aa0;
    box-shadow: 0 0 0 3px rgba(14,90,160,0.12);
  }

  .input-wrap input::placeholder { color: #c9cdd5; }

  .toggle-pass {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer; padding: 4px;
    display: flex; align-items: center;
  }

  .toggle-pass svg {
    position: static; transform: none;
    width: 17px; height: 17px;
    stroke: #9ca3af; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    transition: stroke 0.15s;
  }

  .toggle-pass:hover svg { stroke: #6b7280; }

  .options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 4px 0 28px;
  }

  .remember {
    display: flex; align-items: center; gap: 7px; cursor: pointer;
  }
  .remember input { accent-color: #0e5aa0; width: 15px; height: 15px; cursor: pointer; }
  .remember span { font-size: 13px; color: #6b7280; }

  .forgot {
    font-size: 13px; color: #0e5aa0; text-decoration: none; font-weight: 500;
  }
  .forgot:hover { text-decoration: underline; }

  .btn {
    width: 100%;
    height: 48px;
    background: #0e5aa0;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: #0a4a85; }
  .btn:active { transform: scale(0.98); }

  .footer {
    text-align: center;
    margin-top: 28px;
    font-size: 12px;
    color: #9ca3af;
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-grid"></div>

<div class="card">
  <div class="logo-area">
    <div class="logo-icon">🏫</div>
    <h1>SMKN 4 Palembang</h1>
    <p>Sistem Informasi Akademik</p>
  </div>

  <div class="form-group">
    <label for="username">Username</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <input type="text" id="username" placeholder="Masukkan username">
    </div>
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
      <input type="password" id="password" placeholder="Masukkan password">
      <button class="toggle-pass" onclick="togglePass()" title="Tampilkan password">
        <svg id="eye" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <div class="options">
    <label class="remember">
      <input type="checkbox">
      <span>Ingat saya</span>
    </label>
    <a href="#" class="forgot">Lupa password?</a>
  </div>

  <button class="btn" onclick="handleLogin()">Masuk</button>

  <div class="footer">© 2025 SMKN 4 Palembang</div>
</div>

<script>
  function togglePass() {
    const pw = document.getElementById('password');
    const eye = document.getElementById('eye');
    if (pw.type === 'password') {
      pw.type = 'text';
      eye.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      pw.type = 'password';
      eye.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  function handleLogin() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    if (!user || !pass) {
      alert('Mohon isi username dan password.');
      return;
    }
    alert('Login berhasil! (demo)');
  }
</script>

</body>
</html>
